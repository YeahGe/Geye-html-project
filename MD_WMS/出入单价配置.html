          <p><span style="font-family:'Arial Negreta', 'Arial Normal', 'Arial', sans-serif;font-weight:700;color:#0000FF;">应用描述</span></p><p><span style="font-family:'Arial Normal', 'Arial', sans-serif;font-weight:400;color:#000000;">1.跟随批次码：取对应</span><span style="font-family:'Arial Negreta', 'Arial Normal', 'Arial', sans-serif;font-weight:700;color:#7B4D12;">物料批次二维码</span><span style="font-family:'Arial Normal', 'Arial', sans-serif;font-weight:400;color:#000000;">上的'含税单价'<br>2.分仓移动单价：取物料批次二维码所属的</span><span style="font-family:'Arial Negreta', 'Arial Normal', 'Arial', sans-serif;font-weight:700;color:#7B4D12;">仓库+属主+SKU</span><span style="font-family:'Arial Normal', 'Arial', sans-serif;font-weight:400;color:#000000;">于 [ 物料仓库系统&gt;&gt;库存分析：库存查询 ] 中的'</span><span style="font-family:'Arial Negreta', 'Arial Normal', 'Arial', sans-serif;font-weight:700;color:#4B7902;">移动单价(含)</span><span style="font-family:'Arial Normal', 'Arial', sans-serif;font-weight:400;color:#000000;">'<br>3.不分仓移动单价：取物料批次对应的</span><span style="font-family:'Arial Negreta', 'Arial Normal', 'Arial', sans-serif;font-weight:700;color:#7B4D12;">SKU</span><span style="font-family:'Arial Normal', 'Arial', sans-serif;font-weight:400;color:#000000;">于 [ 物料仓库系统&gt;&gt;库存分析：出入库明细 ] 中于本次记录前的最后一条的'</span><span style="font-family:'Arial Negreta', 'Arial Normal', 'Arial', sans-serif;font-weight:700;color:#D9001B;">移动单价(不分仓)</span><span style="font-family:'Arial Normal', 'Arial', sans-serif;font-weight:400;color:#000000;">'</span></p>
